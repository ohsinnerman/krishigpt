document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 }}\">{{ M.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:11px;align-items:center;\">\n                <div style=\"width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(#0c120d,#0c120d) padding-box,conic-gradient(from 0deg,#67E8F9,#A78BFA,#F472B6,#60A5FA,#67E8F9) border-box;border:1.5px solid transparent;\">🌾<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;padding:16px 18px;border-radius:4px 18px 18px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);\">\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:#C8FF47;animation:kg-bounce 1s ease-in-out infinite;\"><\u002Fspan>\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:#C8FF47;animation:kg-bounce 1s ease-in-out infinite .15s;\"><\u002Fspan>\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:#C8FF47;animation:kg-bounce 1s ease-in-out infinite .3s;\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 44px 22px;\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:8px 8px 8px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));backdrop-filter:blur(28px) saturate(180%);border:1px solid rgba(255,255,255,0.12);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1);\">\n              <button onclick=\"{{ toggleRec }}\" style=\"width:38px;height:38px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#F2F2F0;\">🎤<\u002Fbutton>\n              <input value=\"{{ inputValue }}\" oninput=\"{{ onInput }}\" onkeydown=\"{{ onKey }}\" placeholder=\"{{ placeholder }}\" style=\"flex:1;background:transparent;border:none;outline:none;color:#F2F2F0;font-family:Inter;font-size:15px;\">\n              <button onclick=\"{{ send }}\" class=\"kg-send\" style=\"width:40px;height:40px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#C8FF47;border:none;color:#080C09;font-size:16px;transition:box-shadow .2s,transform .1s;\" style-hover=\"box-shadow:0 0 20px rgba(200,255,71,0.45);\">▶<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;demoMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Landing&quot;,&quot;Active chat&quot;],&quot;default&quot;:&quot;Landing&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  chatRef = React.createRef();\n\n  state = {\n    messages: [],\n    inputValue: '',\n    recording: false,\n    langOpen: false,\n    langIdx: 0,\n    pincode: '',\n    pinLocation: null,\n    typing: false,\n    exampleIdx: 0,\n    exampleOpacity: 1,\n    placeholderIdx: 0,\n  };\n\n  EXAMPLES = [\n    'When should I sow paddy in Karnataka monsoon?',\n    'ಭತ್ತದಲ್ಲಿ ಕಾಂಡ ಕೊರೆಯುವ ಹುಳ ನಿಯಂತ್ರಣ ಹೇಗೆ?',\n    'गेहूं में यूरिया कब और कितना डालें?',\n    'How do I enroll in PMFBY crop insurance?',\n  ];\n  PLACEHOLDERS = [\n    'Ask anything in your language…',\n    'ನಿಮ್ಮ ಭಾಷೆಯಲ್ಲಿ ಕೇಳಿ…',\n    'अपनी भाषा में पूछें…',\n    'உங்கள் மொழியில் கேளுங்கள்…',\n  ];\n  LANGS = ['English', 'ಕನ್ನಡ', 'हिन्दी', 'தமிழ்'];\n  PINS = { '560001': 'Bengaluru, KA', '110001': 'New Delhi, DL', '600001': 'Chennai, TN', '700001': 'Kolkata, WB' };\n\n  CARDS = [\n    { icon: '🌱', label: 'Ask a Query', prompt: 'I have a question about my crops.',\n      bg: 'linear-gradient(135deg,rgba(200,255,71,0.13),rgba(200,255,71,0.04) 60%,rgba(200,255,71,0.07))', border: 'rgba(200,255,71,0.22)', borderHover: 'rgba(200,255,71,0.45)', shadow: '0 0 24px rgba(200,255,71,0.08),inset 0 1px 0 rgba(200,255,71,0.15)' },\n    { icon: '💬', label: 'Chat with Adviser', prompt: 'I want advice on improving my yield this season.',\n      bg: 'linear-gradient(135deg,rgba(196,181,253,0.13),rgba(196,181,253,0.04))', border: 'rgba(196,181,253,0.22)', borderHover: 'rgba(196,181,253,0.45)', shadow: '0 8px 28px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1)' },\n    { icon: '📋', label: 'Scheme Eligibility', prompt: 'Am I eligible for PM-KISAN and crop insurance schemes?',\n      bg: 'linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03))', border: 'rgba(255,255,255,0.12)', borderHover: 'rgba(255,255,255,0.28)', shadow: '0 8px 28px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1)' },\n    { icon: '📸', label: 'Leaf Diagnosis', prompt: 'My tomato leaves have yellow spots — what disease is this?',\n      bg: 'linear-gradient(135deg,rgba(212,168,71,0.11),rgba(212,168,71,0.03))', border: 'rgba(212,168,71,0.2)', borderHover: 'rgba(212,168,71,0.42)', shadow: '0 8px 28px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1)' },\n  ];\n\n  HISTORY = [\n    'When should I sow paddy in Karnataka before the monsoon?',\n    'PMFBY enrollment process — what documents do I need?',\n    'Urea dose for wheat per acre and best timing?',\n  ];\n\n  REPLIES = [\n    'For most of Karnataka, transplant paddy 25–30 days after the first steady monsoon rains — usually mid-June to early July. Keep the nursery well-drained and apply a basal dose of 50kg DAP per acre before transplanting.',\n    'Yellow spots on tomato leaves often point to early blight. Remove affected leaves, avoid overhead watering, and spray Mancozeb (2g/litre) every 7–10 days. Send a clear photo of the leaf underside and I can confirm.',\n    'You likely qualify for PM-KISAN (₹6,000/year) and PMFBY crop insurance. You\\'ll need your Aadhaar, land records (RTC/Pahani), and a bank account linked to Aadhaar. Want me to walk you through enrolment?',\n  ];\n\n  componentDidMount() {\n    if (this.props.demoMode === 'Active chat' && this.state.messages.length === 0) {\n      this.setState({ messages: [\n        { role: 'user', text: 'When should I sow paddy in Karnataka before the monsoon?' },\n        { role: 'bot', text: this.REPLIES[0] },\n      ] });\n    }\n    this._ex = setInterval(() => {\n      this.setState({ exampleOpacity: 0 });\n      setTimeout(() => this.setState(s => ({ exampleIdx: (s.exampleIdx + 1) % this.EXAMPLES.length, exampleOpacity: 1 })), 340);\n    }, 4000);\n    this._ph = setInterval(() => this.setState(s => ({ placeholderIdx: (s.placeholderIdx + 1) % this.PLACEHOLDERS.length })), 3200);\n    this.runGsap();\n  }\n\n  componentWillUnmount() { clearInterval(this._ex); clearInterval(this._ph); }\n\n  componentDidUpdate() {\n    const el = this.chatRef.current;\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  runGsap() {\n    let tries = 0;\n    const go = () => {\n      const g = window.gsap;\n      if (!g) { if (tries++ < 40) setTimeout(go, 80); return; }\n      const tl = g.timeline({ defaults: { ease: 'power3.out' } });\n      tl.from('.kg-nav', { y: -28, opacity: 0, duration: 0.55 }, 0.05)\n        .from('.kg-online', { scale: 0, opacity: 0, duration: 0.4, ease: 'back.out(2)' }, 0.45)\n        .from('.kg-left', { opacity: 0, x: -16, duration: 0.6 }, 0.15)\n        .from('.kg-orb-wrap', { scale: 0.6, opacity: 0, duration: 0.85, ease: 'back.out(1.4)' }, 0.35)\n        .from('.kg-voice', { y: 14, opacity: 0, duration: 0.5 }, 0.85)\n        .from('.kg-right', { opacity: 0, x: 16, duration: 0.6 }, 0.25)\n        .from('.kg-greet', { y: 18, opacity: 0, stagger: 0.08, duration: 0.5 }, 0.5)\n        .from('.kg-wave-emoji', { scale: 0, rotation: -30, duration: 0.5, ease: 'back.out(2)' }, 0.7)\n        .from('.kg-card', { scale: 0.9, opacity: 0, y: 18, stagger: 0.07, duration: 0.5, ease: 'back.out(1.5)' }, 0.7)\n        .from('.kg-hist', { x: 16, opacity: 0, stagger: 0.06, duration: 0.4 }, 0.95);\n\n      document.addEventListener('mousemove', (e) => {\n        const x = (e.clientX / window.innerWidth - 0.5) * 14;\n        const y = (e.clientY / window.innerHeight - 0.5) * 14;\n        g.to('.kg-orb', { rotateY: x, rotateX: -y, duration: 1.4, ease: 'power2.out' });\n      });\n    };\n    go();\n  }\n\n  startChat(prompt) {\n    this.setState({ messages: [{ role: 'user', text: prompt }], typing: true });\n    this.replyTo(prompt);\n  }\n\n  replyTo(text) {\n    const t = text.toLowerCase();\n    let reply = this.REPLIES[0];\n    if (t.includes('leaf') || t.includes('spot') || t.includes('disease') || t.includes('tomato')) reply = this.REPLIES[1];\n    else if (t.includes('scheme') || t.includes('pmfby') || t.includes('kisan') || t.includes('insurance') || t.includes('eligib')) reply = this.REPLIES[2];\n    else if (t.includes('yield') || t.includes('advice') || t.includes('adviser')) reply = 'Happy to help boost your yield. Tell me your crop, soil type, and acreage, and I\\'ll suggest a fertiliser schedule and spacing that fits your region.';\n    setTimeout(() => this.setState(s => ({ typing: false, messages: [...s.messages, { role: 'bot', text: reply }] })), 1300);\n  }\n\n  send = () => {\n    const v = this.state.inputValue.trim();\n    if (!v) return;\n    this.setState(s => ({ messages: [...s.messages, { role: 'user', text: v }], inputValue: '', typing: true }));\n    this.replyTo(v);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const isChat = s.messages.length > 0;\n    const recording = s.recording;\n\n    const messages = s.messages.map(m => {\n      const isBot = m.role === 'bot';\n      return {\n        text: m.text, isBot,\n        row: isBot ? 'justify-content:flex-start;' : 'justify-content:flex-end;',\n        bubble: isBot\n          ? \"max-width:78%;padding:15px 19px;border-radius:4px 18px 18px 18px;font-size:14.5px;line-height:1.6;color:rgba(242,242,240,0.9);background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);\"\n          : \"max-width:72%;padding:13px 17px;border-radius:18px 4px 18px 18px;font-size:14.5px;line-height:1.55;color:#F2F2F0;background:linear-gradient(135deg,rgba(200,255,71,0.12),rgba(200,255,71,0.05));border:1px solid rgba(200,255,71,0.2);\",\n      };\n    });\n\n    return {\n      messages,\n      isLanding: !isChat,\n      isChat,\n      typing: s.typing,\n      inputValue: s.inputValue,\n      placeholder: this.PLACEHOLDERS[s.placeholderIdx],\n      exampleText: this.EXAMPLES[s.exampleIdx],\n      exampleOpacity: s.exampleOpacity,\n\n      langLabel: this.LANGS[s.langIdx],\n      langOpen: s.langOpen,\n      languages: this.LANGS.map((l, i) => ({\n        label: l, tick: i === s.langIdx ? '✓' : '', bar: i === s.langIdx ? '#C8FF47' : 'transparent',\n        pick: () => this.setState({ langIdx: i, langOpen: false }),\n      })),\n      toggleLang: () => this.setState(st => ({ langOpen: !st.langOpen })),\n\n      pincode: s.pincode,\n      pinLocation: s.pinLocation,\n      noPin: !s.pinLocation,\n      pinBorder: s.pinLocation ? 'rgba(200,255,71,0.3)' : 'rgba(255,255,255,0.10)',\n      pinGlow: 'none',\n      onPin: (e) => {\n        const v = e.target.value.replace(/\\D/g, '').slice(0, 6);\n        const loc = v.length === 6 ? (this.PINS[v] || 'Location set') : null;\n        this.setState({ pincode: v, pinLocation: loc });\n      },\n\n      cards: this.CARDS.map(c => ({ ...c, go: () => this.startChat(c.prompt) })),\n      history: this.HISTORY.map(h => ({ text: h, go: () => this.startChat(h) })),\n\n      glowInner: recording ? 'rgba(239,68,68,0.26)' : 'rgba(167,139,250,0.16)',\n      irisHue: recording ? 'hue-rotate(190deg) saturate(1.3)' : 'none',\n      speakLabel: recording ? 'Listening…' : 'Speak',\n      speakColor: recording ? '#FCA5A5' : '#C8FF47',\n      speakBg: recording\n        ? 'linear-gradient(135deg,rgba(239,68,68,0.16),rgba(239,68,68,0.06))'\n        : 'linear-gradient(135deg,rgba(200,255,71,0.13),rgba(200,255,71,0.04))',\n      speakBorder: recording ? 'rgba(239,68,68,0.4)' : 'rgba(200,255,71,0.28)',\n      speakGlow: recording ? '0 0 28px rgba(239,68,68,0.18)' : '0 0 22px rgba(200,255,71,0.1)',\n      toggleRec: () => this.setState(st => ({ recording: !st.recording })),\n\n      onInput: (e) => this.setState({ inputValue: e.target.value }),\n      onKey: (e) => { if (e.key === 'Enter') this.send(); },\n      send: this.send,\n      clearChat: () => this.setState({ messages: [], inputValue: '', recording: false }),\n      noop: () => {},\n      chatRef: this.chatRef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
